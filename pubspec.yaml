name: zrek_assignment
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0-296.2.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^10.7.0
  flutter_bloc: ^9.1.1
  pinch_scrollable: ^1.0.6
  shimmer: ^3.0.0
  sliver_tools: ^0.2.12
  like_button: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Billabong
      fonts:
        - asset: assets/fonts/Billabong.otf
  
  assets:
    - assets/icons/
